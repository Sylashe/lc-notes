<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lc-notes · Sylashe</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --easy: #00b8a3;
      --medium: #ffc01e;
      --hard: #ff375f;
      --accent: #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 960px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    header .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
    }

    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }

    header a {
      margin-left: auto;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    header a:hover { background: var(--surface); }

    /* ── Stats cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    .card .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
    .card .value { font-size: 2rem; font-weight: 700; }
    .card.easy .value  { color: var(--easy); }
    .card.medium .value { color: var(--medium); }
    .card.hard .value  { color: var(--hard); }

    /* ── Donut ── */
    .charts-row {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card.donut {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
    }

    .donut-wrap { position: relative; width: 160px; height: 160px; margin-bottom: 1rem; }
    .donut-wrap svg { transform: rotate(-90deg); }
    .donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700;
    }
    .donut-center span { font-size: 0.75rem; color: var(--muted); font-weight: 400; }

    .legend { width: 100%; }
    .legend-item {
      display: flex; align-items: center;
      gap: .5rem; font-size: .85rem;
      margin-bottom: .4rem;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-item .count { margin-left: auto; color: var(--muted); }

    /* ── Tag bars ── */
    .card.tags { padding: 1.5rem; }
    .card.tags h2 { font-size: .9rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    .tag-bar-row {
      display: flex; align-items: center;
      gap: .75rem; margin-bottom: .6rem;
    }
    .tag-name { width: 160px; font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tag-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .tag-bar-fill  { height: 100%; background: var(--accent); border-radius: 99px; transition: width .6s ease; }
    .tag-count { width: 28px; text-align: right; font-size: .8rem; color: var(--muted); }

    /* ── Heatmap (calendar style) ── */
    .card.heatmap { padding: 1.5rem; margin-bottom: 2rem; }
    .card.heatmap .heatmap-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: .5rem;
    }
    .card.heatmap h2 { font-size: .9rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .heatmap-summary { font-size: .8rem; color: var(--muted); }
    .heatmap-summary strong { color: var(--text); font-weight: 600; }

    .heatmap-calendar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .75rem;
    }
    .month-block {
      background: rgba(255,255,255,.015);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .65rem .7rem .7rem;
      transition: border-color .2s;
    }
    .month-block.is-current {
      border-color: rgba(88,166,255,.35);
      background: rgba(88,166,255,.04);
    }
    .month-title {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .03em;
      color: var(--text);
      margin-bottom: .4rem;
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .month-title .month-count { color: var(--muted); font-weight: 400; font-size: .68rem; }
    .month-dow, .month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .month-dow {
      margin-bottom: 3px;
      font-size: .55rem;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .day-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      background: rgba(48,54,61,.45);
      position: relative;
      transition: transform .15s, box-shadow .15s;
    }
    .day-cell.pad { background: transparent; }
    .day-cell.future { opacity: .15; }
    .day-cell.is-today { outline: 1px solid var(--accent); outline-offset: 1px; }
    .day-cell.active { cursor: default; }
    .day-cell.active:hover { transform: scale(1.55); z-index: 4; }
    .day-cell.diff-easy   { background: var(--easy); }
    .day-cell.diff-medium { background: var(--medium); }
    .day-cell.diff-hard   { background: var(--hard); }
    .day-cell.active[data-intensity="1"] { opacity: .55; }
    .day-cell.active[data-intensity="2"] { opacity: .75; }
    .day-cell.active[data-intensity="3"] { opacity: 1;  }
    .day-cell.active[data-intensity="4"] { opacity: 1; box-shadow: 0 0 6px currentColor; }
    .day-cell.diff-easy.active[data-intensity="4"]   { color: var(--easy); }
    .day-cell.diff-medium.active[data-intensity="4"] { color: var(--medium); }
    .day-cell.diff-hard.active[data-intensity="4"]   { color: var(--hard); }

    .heatmap-legend {
      display: flex; flex-wrap: wrap; gap: 1.25rem;
      margin-top: 1.25rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: .72rem; color: var(--muted);
      align-items: center;
    }
    .legend-group { display: flex; align-items: center; gap: .4rem; }
    .legend-group .day-cell { width: 11px; height: 11px; aspect-ratio: auto; }
    .legend-group .day-cell:hover { transform: none; }

    /* ── Table ── */
    .table-card { padding: 1.5rem; }
    .table-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1rem;
    }
    .table-header h2 { font-size: .9rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    .filters { display: flex; gap: .5rem; }
    .filter-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 10px; border-radius: 6px; font-size: .8rem; cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    .search-box {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 7px 12px;
      font-size: .85rem; margin-bottom: 1rem; outline: none;
    }
    .search-box:focus { border-color: var(--accent); }

    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead th {
      text-align: left; color: var(--muted); font-weight: 500;
      font-size: .78rem; text-transform: uppercase; letter-spacing: .05em;
      padding: .5rem .75rem; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--surface); }
    tbody td { padding: .65rem .75rem; }
    tbody td:first-child { color: var(--muted); width: 55px; }

    .diff-badge {
      display: inline-block; padding: 2px 8px; border-radius: 99px;
      font-size: .75rem; font-weight: 500;
    }
    .diff-badge.Easy   { background: #00b8a31a; color: var(--easy); }
    .diff-badge.Medium { background: #ffc01e1a; color: var(--medium); }
    .diff-badge.Hard   { background: #ff375f1a; color: var(--hard); }

    .tags-cell { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag-chip {
      background: #58a6ff18; color: var(--accent);
      border-radius: 4px; font-size: .72rem; padding: 1px 6px;
    }

    a.problem-link { color: var(--text); text-decoration: none; }
    a.problem-link:hover { color: var(--accent); text-decoration: underline; }

    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: .5rem; margin-top: 1.25rem;
    }
    .page-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
      font-size: .85rem; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .page-btn:hover, .page-btn.active { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: .3; cursor: default; }

    @media (max-width: 900px) {
      .heatmap-calendar { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
      .tag-name { width: 110px; }
      .heatmap-calendar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <img class="avatar" src="https://avatars.githubusercontent.com/u/Sylashe" alt="avatar" onerror="this.src='https://github.com/identicons/Sylashe.png'">
    <div>
      <h1>lc-notes</h1>
      <p>Sylashe's LeetCode progress tracker</p>
    </div>
    <a href="https://github.com/Sylashe/lc-notes" target="_blank">View on GitHub →</a>
  </header>

  <!-- Stats cards -->
  <div class="stats-row">
    <div class="card">
      <div class="label">Total Solved</div>
      <div class="value" id="total">—</div>
    </div>
    <div class="card easy">
      <div class="label">Easy</div>
      <div class="value" id="easy-count">—</div>
    </div>
    <div class="card medium">
      <div class="label">Medium</div>
      <div class="value" id="medium-count">—</div>
    </div>
    <div class="card hard">
      <div class="label">Hard</div>
      <div class="value" id="hard-count">—</div>
    </div>
  </div>

  <!-- Donut + tag bars -->
  <div class="charts-row">
    <div class="card donut">
      <div class="donut-wrap">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="62" fill="none" stroke="#30363d" stroke-width="18"/>
          <circle id="arc-easy"   cx="80" cy="80" r="62" fill="none" stroke="#00b8a3" stroke-width="18" stroke-dasharray="0 999"/>
          <circle id="arc-medium" cx="80" cy="80" r="62" fill="none" stroke="#ffc01e" stroke-width="18" stroke-dasharray="0 999"/>
          <circle id="arc-hard"   cx="80" cy="80" r="62" fill="none" stroke="#ff375f" stroke-width="18" stroke-dasharray="0 999"/>
        </svg>
        <div class="donut-center">
          <strong id="donut-total">—</strong>
          <span>solved</span>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--easy)"></div> Easy <span class="count" id="leg-easy">—</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--medium)"></div> Medium <span class="count" id="leg-medium">—</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--hard)"></div> Hard <span class="count" id="leg-hard">—</span></div>
      </div>
    </div>

    <div class="card tags">
      <h2>Top Topics</h2>
      <div id="tag-bars"></div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="card heatmap">
    <div class="heatmap-head">
      <h2>Activity Calendar</h2>
      <div class="heatmap-summary" id="heatmap-summary"></div>
    </div>
    <div class="heatmap-calendar" id="heatmap-grid"></div>
    <div class="heatmap-legend">
      <div class="legend-group">
        <div class="day-cell diff-easy active" data-intensity="3"></div>
        <span>Easy</span>
      </div>
      <div class="legend-group">
        <div class="day-cell diff-medium active" data-intensity="3"></div>
        <span>Medium</span>
      </div>
      <div class="legend-group">
        <div class="day-cell diff-hard active" data-intensity="3"></div>
        <span>Hard</span>
      </div>
      <div class="legend-group" style="margin-left:auto">
        <span>Fewer</span>
        <div class="day-cell diff-easy active" data-intensity="1"></div>
        <div class="day-cell diff-easy active" data-intensity="2"></div>
        <div class="day-cell diff-easy active" data-intensity="3"></div>
        <div class="day-cell diff-easy active" data-intensity="4"></div>
        <span>More</span>
      </div>
    </div>
  </div>

  <!-- Problem table -->
  <div class="card table-card">
    <div class="table-header">
      <h2>Problems</h2>
      <div class="filters">
        <button class="filter-btn active" data-diff="All">All</button>
        <button class="filter-btn" data-diff="Easy">Easy</button>
        <button class="filter-btn" data-diff="Medium">Medium</button>
        <button class="filter-btn" data-diff="Hard">Hard</button>
      </div>
    </div>
    <input class="search-box" id="search" placeholder="Search problems or topics…" />
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Title</th>
          <th>Difficulty</th>
          <th>Topics</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 62;
const PAGE_SIZE = 20;

let allProblems = [];
let filtered = [];
let currentPage = 1;
let activeDiff = 'All';
let searchQuery = '';

function renderHeatmap(problems) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayKey = toKey(today);

  // Aggregate per-day: count + hardest difficulty
  const DIFF_RANK = { Easy: 1, Medium: 2, Hard: 3 };
  const DIFF_NAME = ['', 'easy', 'medium', 'hard'];
  const dayData = {};
  problems.forEach(p => {
    if (!p.ts) return;
    const d = new Date(p.ts * 1000);
    d.setHours(0, 0, 0, 0);
    const key = toKey(d);
    if (!dayData[key]) dayData[key] = { count: 0, hardest: 0, titles: [] };
    dayData[key].count++;
    const r = DIFF_RANK[p.difficulty] || 0;
    if (r > dayData[key].hardest) dayData[key].hardest = r;
    dayData[key].titles.push(`${p.difficulty[0]} · ${p.title}`);
  });

  // Last 12 months ending with current
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth() });
  }

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DOW = ['S','M','T','W','T','F','S'];
  const container = document.getElementById('heatmap-grid');
  container.innerHTML = '';

  let totalSolved = 0, activeDays = 0, currentStreak = 0, longestStreak = 0, runStreak = 0;

  months.forEach(({ year, month }) => {
    const block = document.createElement('div');
    block.className = 'month-block';
    if (year === today.getFullYear() && month === today.getMonth()) {
      block.classList.add('is-current');
    }

    // Count for this month
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    let monthCount = 0;
    for (let day = 1; day <= daysInMonth; day++) {
      const key = toKey(new Date(year, month, day));
      if (dayData[key]) monthCount += dayData[key].count;
    }

    const title = document.createElement('div');
    title.className = 'month-title';
    title.innerHTML = `<span>${MONTH_NAMES[month]} <span style="color:var(--muted);font-weight:400">${year}</span></span><span class="month-count">${monthCount || ''}</span>`;
    block.appendChild(title);

    const dowRow = document.createElement('div');
    dowRow.className = 'month-dow';
    DOW.forEach(d => {
      const c = document.createElement('span');
      c.textContent = d;
      dowRow.appendChild(c);
    });
    block.appendChild(dowRow);

    const grid = document.createElement('div');
    grid.className = 'month-grid';

    const startWeekday = new Date(year, month, 1).getDay();
    for (let i = 0; i < startWeekday; i++) {
      const pad = document.createElement('div');
      pad.className = 'day-cell pad';
      grid.appendChild(pad);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const date = new Date(year, month, day);
      const key = toKey(date);
      const data = dayData[key];
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      if (data) {
        const intensity = Math.min(4, Math.ceil(data.count / 1.5));
        cell.classList.add('active', `diff-${DIFF_NAME[data.hardest]}`);
        cell.dataset.intensity = intensity;
        const titleStr = data.titles.slice(0, 4).join('\n') + (data.titles.length > 4 ? `\n+ ${data.titles.length - 4} more` : '');
        cell.title = `${key} · ${data.count} problem${data.count > 1 ? 's' : ''}\n${titleStr}`;
        totalSolved += data.count;
        activeDays++;
      }

      if (date > today) cell.classList.add('future');
      if (key === todayKey) cell.classList.add('is-today');

      grid.appendChild(cell);
    }

    block.appendChild(grid);
    container.appendChild(block);
  });

  // Streaks (over the last 12 months window)
  const earliest = new Date(months[0].year, months[0].month, 1);
  for (let d = new Date(earliest); d <= today; d.setDate(d.getDate() + 1)) {
    if (dayData[toKey(d)]) {
      runStreak++;
      if (runStreak > longestStreak) longestStreak = runStreak;
    } else {
      runStreak = 0;
    }
  }
  // Current streak: walk back from today
  let cs = 0;
  for (let d = new Date(today); ; d.setDate(d.getDate() - 1)) {
    if (dayData[toKey(d)]) cs++;
    else break;
  }
  currentStreak = cs;

  document.getElementById('heatmap-summary').innerHTML =
    `<strong>${totalSolved}</strong> solved · <strong>${activeDays}</strong> active days · ` +
    `<strong>${currentStreak}</strong>d current streak · <strong>${longestStreak}</strong>d longest`;
}

function toKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

async function loadData() {
  const res = await fetch('data.json');
  allProblems = await res.json();
  render();
}

function render() {
  const easy   = allProblems.filter(p => p.difficulty === 'Easy').length;
  const medium = allProblems.filter(p => p.difficulty === 'Medium').length;
  const hard   = allProblems.filter(p => p.difficulty === 'Hard').length;
  const total  = allProblems.length;

  // Cards
  document.getElementById('total').textContent = total;
  document.getElementById('easy-count').textContent = easy;
  document.getElementById('medium-count').textContent = medium;
  document.getElementById('hard-count').textContent = hard;
  document.getElementById('donut-total').textContent = total;
  document.getElementById('leg-easy').textContent = easy;
  document.getElementById('leg-medium').textContent = medium;
  document.getElementById('leg-hard').textContent = hard;

  renderHeatmap(allProblems);

  // Donut arcs
  let offset = 0;
  function setArc(id, count) {
    const pct = count / total;
    const dash = pct * CIRCUMFERENCE;
    const el = document.getElementById(id);
    el.style.strokeDasharray = `${dash} ${CIRCUMFERENCE - dash}`;
    el.style.strokeDashoffset = -offset;
    offset += dash;
  }
  setArc('arc-easy', easy);
  setArc('arc-medium', medium);
  setArc('arc-hard', hard);

  // Tag bars
  const tagCount = {};
  allProblems.forEach(p => p.tags.forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; }));
  const topTags = Object.entries(tagCount).sort((a,b) => b[1]-a[1]).slice(0, 12);
  const maxTag = topTags[0]?.[1] || 1;
  document.getElementById('tag-bars').innerHTML = topTags.map(([tag, cnt]) => `
    <div class="tag-bar-row">
      <div class="tag-name">${tag}</div>
      <div class="tag-bar-track"><div class="tag-bar-fill" style="width:${cnt/maxTag*100}%"></div></div>
      <div class="tag-count">${cnt}</div>
    </div>
  `).join('');

  applyFilter();
}

function applyFilter() {
  filtered = allProblems.filter(p => {
    if (activeDiff !== 'All' && p.difficulty !== activeDiff) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return p.title.toLowerCase().includes(q) ||
             p.tags.some(t => t.toLowerCase().includes(q));
    }
    return true;
  });
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('table-body').innerHTML = page.map(p => `
    <tr>
      <td>${p.id}</td>
      <td><a class="problem-link" href="https://leetcode.com/problems/${p.slug}/" target="_blank">${p.title}</a></td>
      <td><span class="diff-badge ${p.difficulty}">${p.difficulty}</span></td>
      <td><div class="tags-cell">${p.tags.slice(0,3).map(t => `<span class="tag-chip">${t}</span>`).join('')}</div></td>
    </tr>
  `).join('');

  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 3) {
      html += `<span style="color:var(--muted);padding:0 4px">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  window.scrollTo({ top: document.querySelector('.table-card').offsetTop - 20, behavior: 'smooth' });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDiff = btn.dataset.diff;
    applyFilter();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  applyFilter();
});

loadData();
</script>
</body>
</html>
