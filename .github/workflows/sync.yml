name: Sync LeetCode submissions

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC (2am EST / 11pm PST)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch new AC submissions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
        run: python scripts/fetch_leetcode.py --cookie "$LEETCODE_SESSION"

      - name: Refresh dashboard data
        run: python scripts/generate_data.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add problems/ docs/
          if git diff --cached --quiet; then
            echo "No new problems, skipping commit."
          else
            COUNT=$(git diff --cached --name-only | grep "^problems/" | wc -l | tr -d ' ')
            git commit -m "auto: sync ${COUNT} new problems from LeetCode"
            git push
          fi
